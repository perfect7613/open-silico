profile: mechanoscope-check
provider: daytona
target: linux
class: beast
ttl: 90m
idleTimeout: 20m

daytona:
  apiUrl: https://app.daytona.io/api
  snapshot: daytona-medium
  user: daytona
  workRoot: /home/daytona/crabbox
  sshGatewayHost: ssh.app.daytona.io
  sshAccessMinutes: 30

capacity:
  market: spot
  strategy: most-available
  fallback: on-demand-after-120s

actions:
  workflow: .github/workflows/crabbox.yml
  job: hydrate
  runnerLabels: [crabbox]
  runnerVersion: latest
  ephemeral: true

sync:
  delete: true
  checksum: false
  gitSeed: true
  fingerprint: true
  timeout: 15m
  warnFiles: 50000
  warnBytes: 5368709120
  failFiles: 150000
  failBytes: 21474836480
  exclude:
    - .cache
    - .turbo
    - dist
    - node_modules
    - .npm
    - .yarn/cache
    - .venv
    - .pytest_cache
    - .ruff_cache

run:
  preflightTools: [git, python3, node, npm]

env:
  allow: [CI, NODE_OPTIONS]

ssh:
  user: daytona
  port: "22"
  fallbackPorts: []

cache:
  volumes: []

jobs:
  backend:
    shell: true
    command: >
      command -v uv >/dev/null || (curl -LsSf https://astral.sh/uv/install.sh | sh);
      export PATH="$HOME/.local/bin:$PATH";
      uv sync --frozen --group dev &&
      uv run ruff check backend tests &&
      uv run ruff format --check backend tests &&
      uv run pytest tests/backend
    stop: auto

  frontend:
    shell: true
    command: >
      cd frontend &&
      npm ci &&
      npm test -- --run &&
      npm run lint &&
      npm run build
    stop: auto

  contracts:
    shell: true
    command: >
      command -v uv >/dev/null || (curl -LsSf https://astral.sh/uv/install.sh | sh);
      export PATH="$HOME/.local/bin:$PATH";
      uv sync --frozen --group dev &&
      cd frontend && npm ci && npm run contracts:generate &&
      git diff --exit-code -- openapi.json src/generated/api-schema.ts
    stop: auto

  full:
    shell: true
    command: >
      command -v uv >/dev/null || (curl -LsSf https://astral.sh/uv/install.sh | sh);
      export PATH="$HOME/.local/bin:$PATH";
      uv sync --frozen --group dev &&
      uv run ruff check backend tests &&
      uv run ruff format --check backend tests &&
      uv run pytest &&
      cd frontend && npm ci && npm test -- --run && npm run lint && npm run build
    stop: auto
